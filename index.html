<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="我的毛線">
<meta name="theme-color" content="#c96b8a">
<title>🧶 我的毛線</title>
<style>
  :root {
    --bg: #fdf6f0;
    --card-bg: #ffffff;
    --accent: #c96b8a;
    --accent2: #e8a0b4;
    --text: #3a2a2a;
    --muted: #9a7a7a;
    --tag-bg: #fde8f0;
    --shadow: 0 4px 20px rgba(180,100,130,0.12);
    --radius: 16px;
  }
  /* ── iOS Safari 觸控修正 ── */
  * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; margin: 0; padding: 0; }
  button, .card, .filter-btn, .io-btn, .add-btn,
  .toggle-row, .img-upload-area, .photo-slot,
  .tags-input-wrap, .platform-icon,
  .close-btn, .btn-edit, .btn-delete, .btn-save, .btn-cancel {
    cursor: pointer;
    touch-action: manipulation;
  }
  .overlay, .form-overlay { -webkit-overflow-scrolling: touch; }
  .modal-wrapper { pointer-events: auto; }
  body { font-family: -apple-system, "PingFang TC", "Noto Sans TC", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ── 頂部 ── */
  header { background: linear-gradient(135deg, #c96b8a 0%, #e8a0b4 100%); padding: 32px 24px 24px; text-align: center; color: white; }
  header h1 { font-size: 26px; font-weight: 800; letter-spacing: 1px; }
  header p  { margin-top: 6px; opacity: 0.88; font-size: 14px; }

  /* ── 搜尋 + 篩選 ── */
  .toolbar { max-width: 900px; margin: 24px auto 0; padding: 0 20px; display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
  .search-box { flex: 1 1 220px; display: flex; align-items: center; background: white; border-radius: 50px; padding: 8px 18px; box-shadow: var(--shadow); gap: 8px; }
  .search-box input { border: none; outline: none; background: transparent; font-size: 14px; color: var(--text); width: 100%; }
  .search-box span { color: var(--muted); }
  .filters { display: flex; flex-wrap: wrap; gap: 8px; }
  .filter-btn { padding: 7px 16px; border-radius: 50px; border: 1.5px solid var(--accent2); background: white; color: var(--accent); font-size: 13px; cursor: pointer; transition: all 0.18s; font-weight: 500; }
  .filter-btn:hover, .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

  .count-bar { max-width: 900px; margin: 16px auto 0; padding: 0 20px; font-size: 13px; color: var(--muted); }

  /* ── 作品格局 ── */
  .gallery { max-width: 900px; margin: 16px auto 100px; padding: 0 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
  .card { background: var(--card-bg); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
  .card:hover { transform: translateY(-4px); box-shadow: 0 10px 32px rgba(180,100,130,0.2); }

  /* 卡片縮圖：展示圖為主，封面圖右下角小圖 */
  .card-thumb { width: 100%; aspect-ratio: 1; background: #f5e8ee; display: flex; align-items: center; justify-content: center; font-size: 48px; overflow: hidden; position: relative; }
  .card-thumb .main-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .card-thumb .corner-img {
    position: absolute; bottom: 6px; right: 6px;
    width: 22%; height: 22%;
    object-fit: cover; border-radius: 6px;
    border: 2px solid white;
    box-shadow: 0 2px 6px rgba(0,0,0,0.22);
    z-index: 2;
  }

  .card-body { padding: 14px; }
  .card-title { font-size: 15px; font-weight: 700; margin-bottom: 8px; }
  .card-tags  { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
  .tag { background: var(--tag-bg); color: var(--accent); border-radius: 50px; padding: 3px 10px; font-size: 11px; font-weight: 500; }

  /* 平台 icon 連結 */
  .card-platforms { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .platform-icon { display: inline-flex; align-items: center; gap: 5px; padding: 3px 8px 3px 4px; border-radius: 8px; text-decoration: none; transition: transform 0.15s, opacity 0.15s; flex-shrink: 0; }
  .platform-icon:hover { transform: scale(1.06); opacity: 0.85; }
  .platform-icon svg { width: 20px; height: 20px; flex-shrink: 0; }
  .platform-icon .pname { font-size: 11px; font-weight: 600; }
  .platform-icon.pi-bili { background: #e8f0ff; color: #2563eb; }
  .platform-icon.pi-xhs  { background: #fee8e8; color: #dc2626; }
  .platform-icon.pi-ql   { background: #e8f8f0; color: #16a34a; }
  .platform-icon.pi-yt   { background: #fff3e8; color: #FF6B00; }
  .platform-icon.pi-dy   { background: #f0f0f0; color: #161823; }
  .platform-icon.pi-other{ background: #f3e8ff; color: #7c3aed; }

  /* ── 詳情 Modal ── */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(60,20,30,0.45); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
  .overlay.open { display: flex; }
  .modal { background: var(--card-bg); border-radius: 22px; max-width: 520px; width: 100%; max-height: 88vh; overflow-y: auto; -webkit-overflow-scrolling: touch; box-shadow: 0 20px 60px rgba(0,0,0,0.25); animation: pop 0.22s cubic-bezier(0.34,1.56,0.64,1); }
  @keyframes pop { from { transform: scale(0.88); opacity:0; } to { transform: scale(1); opacity:1; } }
  .modal-img { width: 100%; aspect-ratio: 4/3; object-fit: cover; border-radius: 22px 22px 0 0; background: #f5e8ee; display: flex; align-items: center; justify-content: center; font-size: 80px; overflow: hidden; }
  .modal-img img { width:100%; height:100%; object-fit:cover; border-radius: 22px 22px 0 0; }
  .modal-body { padding: 22px 24px 28px; }
  .modal-title { font-size: 20px; font-weight: 800; margin-bottom: 4px; }
  .modal-date  { font-size: 12px; color: var(--muted); margin-bottom: 14px; }
  .modal-tags  { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
  .modal-section { margin-bottom: 16px; }
  .modal-section h3 { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin-bottom: 8px; }
  .modal-note { font-size: 13px; line-height: 1.7; background: var(--bg); border-radius: 10px; padding: 12px 14px; color: var(--text); }
  .modal-links { display: flex; flex-direction: column; gap: 8px; }
  .modal-link { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 12px; text-decoration: none; font-size: 13px; font-weight: 600; transition: opacity 0.15s; }
  .modal-link:hover { opacity: 0.75; }
  .link-bili     { background: #e8f0ff; color: #2563eb; }
  .link-xhs      { background: #fee8e8; color: #dc2626; }
  .link-qianliao { background: #e8f8f0; color: #16a34a; }
  .link-yt       { background: #fff3e8; color: #FF6B00; }
  .link-dy       { background: #f0f0f0; color: #161823; }
  .link-other    { background: #f3e8ff; color: #7c3aed; }
  .modal-link .icon { font-size: 18px; }
  .modal-photos { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; }
  .modal-photos img { width:100%; aspect-ratio:1; object-fit:cover; border-radius:8px; background: #f5e8ee; }
  .modal-actions { display: flex; gap: 10px; margin-top: 16px; }
  .btn-edit { flex:1; padding: 10px; border-radius: 12px; border: 1.5px solid var(--accent); background: white; color: var(--accent); font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.15s; }
  .btn-edit:hover { background: var(--accent); color: white; }
  .btn-delete { padding: 10px 16px; border-radius: 12px; border: 1.5px solid #fca5a5; background: white; color: #dc2626; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.15s; }
  .btn-delete:hover { background: #fee2e2; }

  .close-btn { position: absolute; top: 16px; right: 16px; background: rgba(255,255,255,0.9); border: none; border-radius: 50%; width: 34px; height: 34px; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.15); z-index: 10; }
  .modal-wrapper { position: relative; }
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 15px; }
  .empty span { font-size: 48px; display: block; margin-bottom: 12px; }

  /* ── 新增按鈕 ── */
  .add-btn { position: fixed; bottom: 28px; right: 28px; background: linear-gradient(135deg, #c96b8a, #e8a0b4); color: white; border: none; border-radius: 50px; padding: 14px 24px; font-size: 15px; font-weight: 700; cursor: pointer; box-shadow: 0 6px 24px rgba(200,100,140,0.4); transition: transform 0.18s; display: flex; align-items: center; gap: 8px; z-index: 50; }
  .add-btn:hover { transform: translateY(-2px); }

  /* ── 匯出/匯入工具列 ── */
  .io-bar { max-width: 900px; margin: 12px auto 0; padding: 0 20px; display: flex; gap: 10px; flex-wrap: wrap; }
  .io-btn { display: flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 50px; border: 1.5px solid var(--accent2); background: white; color: var(--accent); font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.18s; }
  .io-btn:hover { background: var(--accent); color: white; border-color: var(--accent); }
  .io-btn.danger { border-color: #fca5a5; color: #dc2626; }
  .io-btn.danger:hover { background: #fee2e2; color: #dc2626; border-color: #fca5a5; }

  /* ── 新增/編輯表單 Modal ── */
  .form-overlay { display: none; position: fixed; inset: 0; background: rgba(40,10,20,0.5); z-index: 200; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .form-overlay.open { display: block; }
  .form-modal { background: var(--card-bg); border-radius: 22px; max-width: 540px; width: calc(100% - 40px); padding: 28px 28px 32px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); margin: 20px auto; position: relative; }
  .form-modal h2 { font-size: 18px; font-weight: 800; margin-bottom: 22px; color: var(--accent); }

  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 6px; }
  .form-group input, .form-group textarea, .form-group select {
    width: 100%; padding: 10px 14px; border-radius: 12px;
    border: 1.5px solid #e8d0d8; background: var(--bg);
    font-size: 14px; color: var(--text); outline: none;
    font-family: inherit; transition: border-color 0.15s;
  }
  .form-group input:focus, .form-group textarea:focus { border-color: var(--accent); }
  .form-group textarea { resize: vertical; min-height: 80px; }

  /* 圖片上傳區 */
  .img-upload-area {
    width: 100%; aspect-ratio: 3/2; border-radius: 14px;
    border: 2px dashed var(--accent2); background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.18s; position: relative; overflow: hidden;
    gap: 8px;
  }
  .img-upload-area:hover { border-color: var(--accent); background: #fdf0f5; }
  .img-upload-area img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; border-radius: 12px; }
  .img-upload-area .upload-hint { font-size: 13px; color: var(--muted); text-align: center; z-index: 1; }
  .img-upload-area .upload-icon { font-size: 32px; z-index: 1; }
  .img-upload-area input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; z-index: 2; }
  .img-clear { position: absolute; top: 8px; right: 8px; background: rgba(255,255,255,0.9); border: none; border-radius: 50%; width: 28px; height: 28px; font-size: 14px; cursor: pointer; z-index: 3; display: none; box-shadow: 0 2px 6px rgba(0,0,0,0.15); }

  /* 多張過程圖 */
  .photos-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 8px; }
  .photo-slot { aspect-ratio: 1; border-radius: 10px; border: 2px dashed var(--accent2); background: var(--bg); display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; position: relative; transition: all 0.15s; }
  .photo-slot:hover { border-color: var(--accent); }
  .photo-slot img { width: 100%; height: 100%; object-fit: cover; }
  .photo-slot input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .photo-slot .remove-photo { position: absolute; top: 2px; right: 2px; background: rgba(220,50,50,0.85); color: white; border: none; border-radius: 50%; width: 20px; height: 20px; font-size: 11px; cursor: pointer; display: none; z-index: 3; }
  .photo-slot:hover .remove-photo { display: flex; align-items: center; justify-content: center; }
  .photo-slot .plus { font-size: 22px; color: var(--accent2); }

  /* 標籤輸入 */
  .tags-input-wrap { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 12px; border-radius: 12px; border: 1.5px solid #e8d0d8; background: var(--bg); min-height: 44px; align-items: center; cursor: text; }
  .tags-input-wrap:focus-within { border-color: var(--accent); }
  .tag-item { background: var(--tag-bg); color: var(--accent); border-radius: 50px; padding: 3px 10px; font-size: 12px; font-weight: 500; display: flex; align-items: center; gap: 4px; }
  .tag-item button { background: none; border: none; color: var(--accent); cursor: pointer; font-size: 13px; padding: 0; line-height: 1; opacity: 0.6; }
  .tag-item button:hover { opacity: 1; }
  .tags-input-wrap input { border: none; outline: none; background: transparent; font-size: 13px; color: var(--text); flex: 1; min-width: 80px; }

  /* 表單按鈕 */
  .form-btns { display: flex; gap: 10px; margin-top: 24px; }
  .btn-save { flex: 1; padding: 13px; background: linear-gradient(135deg, #c96b8a, #e8a0b4); color: white; border: none; border-radius: 14px; font-size: 15px; font-weight: 700; cursor: pointer; transition: opacity 0.15s; }
  .btn-save:hover { opacity: 0.88; }
  .btn-cancel { padding: 13px 20px; background: var(--bg); color: var(--muted); border: 1.5px solid #e8d0d8; border-radius: 14px; font-size: 15px; font-weight: 600; cursor: pointer; }
  .btn-cancel:hover { background: #f5e8ee; }

  /* 勾選開關 */
  .toggle-row { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 12px; border: 1.5px solid #e8d0d8; background: var(--bg); cursor: pointer; user-select: none; transition: border-color 0.15s; }
  .toggle-row:hover { border-color: var(--accent2); }
  .toggle-row input[type=checkbox] { display: none; }
  .toggle-box { width: 42px; height: 24px; border-radius: 50px; background: #ddd; position: relative; transition: background 0.2s; flex-shrink: 0; }
  .toggle-box::after { content: ''; position: absolute; top: 3px; left: 3px; width: 18px; height: 18px; border-radius: 50%; background: white; box-shadow: 0 1px 4px rgba(0,0,0,0.2); transition: left 0.2s; }
  .toggle-row.checked .toggle-box { background: var(--accent); }
  .toggle-row.checked .toggle-box::after { left: 21px; }
  .toggle-label { font-size: 13px; color: var(--text); }
  .toggle-row.checked .toggle-label { color: var(--accent); font-weight: 600; }

  /* 表單兩欄 */
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

</style>
</head>
<body>

<header>
  <h1>🧶 我的毛線</h1>
  <p>點擊作品查看照片、教學連結與製作筆記</p>
</header>

<div class="toolbar">
  <div class="search-box">
    <span>🔍</span>
    <input type="text" id="searchInput" placeholder="搜尋作品名稱、針法、標籤…" oninput="render()">
  </div>
  <div class="filters" id="filterBar"></div>
</div>
<div class="count-bar" id="countBar"></div>

<!-- 匯出/匯入工具列 -->
<div class="io-bar">
  <button class="io-btn" id="btnExport" type="button">📤 匯出備份</button>
  <button class="io-btn" id="btnImport" type="button">📥 匯入還原</button>
  <input type="file" id="importInput" accept=".json" style="display:none">
</div>

<div class="gallery" id="gallery"></div>

<!-- 詳情 Modal -->
<div class="overlay" id="overlay">
  <div class="modal-wrapper">
    <button class="close-btn" id="btnCloseModal">✕</button>
    <div class="modal" id="modal"></div>
  </div>
</div>

<!-- 新增/編輯表單 Modal -->
<div class="form-overlay" id="formOverlay">
  <div class="form-modal" id="formModal">
    <h2 id="formTitle">✨ 新增作品</h2>

    <div class="form-group">
      <label>圖片上傳</label>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div>
          <div style="font-size:11px;color:var(--muted);font-weight:700;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px">封面圖片</div>
          <div class="img-upload-area" id="coverUploadArea">
            <span class="upload-icon">🖼️</span>
            <div class="upload-hint">點擊上傳<br><span style="font-size:10px;opacity:0.7">封面縮圖</span></div>
            <img id="coverPreview" src="" alt="" style="display:none">
            <button class="img-clear" id="coverClear" type="button">✕</button>
            <input type="file" id="coverInput" accept="image/*">
          </div>
        </div>
        <div>
          <div style="font-size:11px;color:var(--muted);font-weight:700;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px">作品展示圖</div>
          <div class="img-upload-area" id="displayUploadArea">
            <span class="upload-icon" id="displayIcon">🎨</span>
            <div class="upload-hint" id="displayHint">點擊上傳<br><span style="font-size:10px;opacity:0.7">展示主圖</span></div>
            <img id="displayPreview" src="" alt="" style="display:none">
            <button class="img-clear" id="displayClear" type="button">✕</button>
            <input type="file" id="displayInput" accept="image/*">
          </div>
        </div>
      </div>
    </div>

    <div class="form-group">
      <label>編織資料（可一次選取多張）</label>
      <div style="margin-bottom:8px">
        <button class="io-btn" id="btnPickPhotos" type="button" style="width:100%;justify-content:center;padding:12px">
          📂 從相簿選取圖片
        </button>
        <input type="file" id="photosInput" accept="image/*" multiple style="display:none">
      </div>
      <div class="photos-grid" id="photosGrid"></div>
    </div>

    <div class="form-group">
      <label>作品名稱 *</label>
      <input type="text" id="fName" placeholder="例如：貓咪掛件">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>已完成</label>
        <div class="toggle-row" id="doneToggle">
          <div class="toggle-box"></div>
          <span class="toggle-label">尚未完成</span>
        </div>
      </div>
      <div class="form-group">
        <label>針號</label>
        <input type="text" id="fNeedle" placeholder="例如：2.5mm 鉤針">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>毛線 / 材料</label>
        <input type="text" id="fYarn" placeholder="例如：黑白棉線">
      </div>
      <div class="form-group">
        <label>材料已購</label>
        <div class="toggle-row" id="boughtToggle">
          <div class="toggle-box"></div>
          <span class="toggle-label">尚未購買</span>
        </div>
      </div>
    </div>

    <div class="form-group">
      <label>標籤（輸入後按 Enter 新增）</label>
      <div class="tags-input-wrap" id="tagsWrap">
        <input type="text" id="tagInput" placeholder="例如：鉤針">
      </div>
    </div>

    <div class="form-group">
      <label>製作筆記</label>
      <textarea id="fNote" placeholder="心得、技巧、用線量…"></textarea>
    </div>

    <div class="form-group">
      <label>📺 BiliBili 連結</label>
      <input type="url" id="fBili" placeholder="https://www.bilibili.com/video/…">
    </div>
    <div class="form-group">
      <label>📕 小紅書連結</label>
      <input type="url" id="fXhs" placeholder="https://www.xiaohongshu.com/…">
    </div>
    <div class="form-group">
      <label>🎓 千聊連結</label>
      <input type="url" id="fQl" placeholder="https://m.qlchat.com/…">
    </div>
    <div class="form-group">
      <label>▶️ YouTube 連結</label>
      <input type="url" id="fYt" placeholder="https://www.youtube.com/watch?v=…">
    </div>
    <div class="form-group">
      <label>🎵 抖音連結</label>
      <input type="url" id="fDy" placeholder="https://www.douyin.com/video/…">
    </div>
    <div class="form-group">
      <label>🔗 其他連結</label>
      <input type="url" id="fOther" placeholder="https://…">
    </div>

    <div class="form-btns">
      <button class="btn-cancel" id="btnCancel" type="button">取消</button>
      <button class="btn-save" id="btnSave" type="button">💾 儲存作品</button>
    </div>
  </div>
</div>

<button class="add-btn" id="btnAddWork" type="button">➕ 新增作品</button>

<script>
/* ═══════════════════════════════════════════
   IndexedDB 儲存層（容量遠大於 localStorage）
═══════════════════════════════════════════ */
const DB_NAME = 'knitting_db';
const STORE   = 'works';
let db, works = [];

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = e => {
      e.target.result.createObjectStore(STORE, { keyPath: 'id' });
    };
    req.onsuccess = e => { db = e.target.result; resolve(); };
    req.onerror   = () => reject(req.error);
  });
}
function dbGetAll() {
  return new Promise((resolve, reject) => {
    const req = db.transaction(STORE,'readonly').objectStore(STORE).getAll();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror   = () => reject(req.error);
  });
}
function dbPut(work) {
  return new Promise((resolve, reject) => {
    const req = db.transaction(STORE,'readwrite').objectStore(STORE).put(work);
    req.onsuccess = () => resolve();
    req.onerror   = () => reject(req.error);
  });
}
function dbDelete(id) {
  return new Promise((resolve, reject) => {
    const req = db.transaction(STORE,'readwrite').objectStore(STORE).delete(id);
    req.onsuccess = () => resolve();
    req.onerror   = () => reject(req.error);
  });
}
function dbClear() {
  return new Promise((resolve, reject) => {
    const req = db.transaction(STORE,'readwrite').objectStore(STORE).clear();
    req.onsuccess = () => resolve();
    req.onerror   = () => reject(req.error);
  });
}

/* ═══════════════════════════════════════════
   匯出 / 匯入
═══════════════════════════════════════════ */
function exportData() {
  const data = JSON.stringify(works, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const now  = new Date();
  const ts   = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
  const a    = document.createElement('a');
  a.href = url; a.download = `毛線作品備份_${ts}.json`; a.click();
  URL.revokeObjectURL(url);
}
async function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async ev => {
    try {
      const imported = JSON.parse(ev.target.result);
      if (!Array.isArray(imported)) throw new Error();
      if (!confirm(`確定要匯入 ${imported.length} 件作品嗎？\n⚠️ 這將取代現有所有資料！`)) return;
      await dbClear();
      for (const w of imported) await dbPut(w);
      works = await dbGetAll();
      render();
      alert(`✅ 成功匯入 ${imported.length} 件作品！`);
    } catch { alert('❌ 檔案格式錯誤，請選擇正確的備份 .json 檔案'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

/* ═══════════════════════════════════════════

═══════════════════════════════════════════ */
let activeFilter = "全部";

function allTags() {
  const set = new Set(["全部"]);
  works.forEach(w => (w.tags||[]).forEach(t => set.add(t)));
  return [...set];
}
function buildFilterBar() {
  document.getElementById("filterBar").innerHTML = allTags().map(t =>
    `<button class="filter-btn ${t===activeFilter?'active':''}" onclick="setFilter('${t}')">${t}</button>`
  ).join("");
}
function setFilter(t) { activeFilter = t; buildFilterBar(); render(); }

function filteredWorks() {
  const q = document.getElementById("searchInput").value.toLowerCase();
  return works.filter(w => {
    const matchFilter = activeFilter === "全部" || (w.tags||[]).includes(activeFilter);
    const matchSearch = !q || w.name.toLowerCase().includes(q) ||
      (w.tags||[]).some(t => t.toLowerCase().includes(q)) ||
      (w.note && w.note.toLowerCase().includes(q));
    return matchFilter && matchSearch;
  });
}

function thumbHTML(w) {
  if (w.displayImage) {
    const corner = w.image ? `<img class="corner-img" src="${w.image}" alt="">` : '';
    return `<div class="card-thumb"><img class="main-img" src="${w.displayImage}" alt="${w.name}">${corner}</div>`;
  }
  if (w.image) return `<div class="card-thumb"><img class="main-img" src="${w.image}" alt="${w.name}"></div>`;
  return `<div class="card-thumb">🧶</div>`;
}

function platformIcons(links, stopProp=true) {
  const sp = stopProp ? 'onclick="event.stopPropagation()"' : '';
  let html = "";
  if (!links) return `<span style="font-size:11px;color:#bbb">暫無連結</span>`;
  if (links.bilibili)    html += `<a class="platform-icon pi-bili"  href="${links.bilibili}"    target="_blank" title="BiliBili" ${sp}>${ICONS.bilibili}<span class="pname">BiliBili</span></a>`;
  if (links.xiaohongshu) html += `<a class="platform-icon pi-xhs"   href="${links.xiaohongshu}" target="_blank" title="小紅書"   ${sp}>${ICONS.xiaohongshu}<span class="pname">小紅書</span></a>`;
  if (links.qianliao)    html += `<a class="platform-icon pi-ql"    href="${links.qianliao}"    target="_blank" title="千聊"     ${sp}>${ICONS.qianliao}<span class="pname">千聊</span></a>`;
  if (links.youtube)     html += `<a class="platform-icon pi-yt"    href="${links.youtube}"     target="_blank" title="YouTube"  ${sp}>${ICONS.youtube}<span class="pname">YouTube</span></a>`;
  if (links.douyin)      html += `<a class="platform-icon pi-dy"    href="${links.douyin}"      target="_blank" title="抖音"     ${sp}>${ICONS.douyin}<span class="pname">抖音</span></a>`;
  if (links.other)       html += `<a class="platform-icon pi-other" href="${links.other}"       target="_blank" title="其他"     ${sp}>${ICONS.other}<span class="pname">其他</span></a>`;
  return html || `<span style="font-size:11px;color:#bbb">暫無連結</span>`;
}

function render() {
  const list = filteredWorks();
  document.getElementById("countBar").textContent = `共 ${list.length} 件作品`;
  buildFilterBar();
  if (!list.length) {
    document.getElementById("gallery").innerHTML = `<div class="empty" style="grid-column:1/-1"><span>🔍</span>找不到符合的作品</div>`;
    return;
  }
  document.getElementById("gallery").innerHTML = list.map(w => `
    <div class="card" data-id="${w.id}" role="button" tabindex="0">
      ${thumbHTML(w)}
      <div class="card-body">
        <div class="card-title">${w.name} ${w.done ? '<span style="font-size:11px;color:#16a34a">✅</span>' : ''}</div>
        <div class="card-tags">${(w.tags||[]).map(t=>`<span class="tag">${t}</span>`).join("")}</div>
        <div class="card-platforms">${platformIcons(w.links||{})}</div>
      </div>
    </div>
  `).join("");
  document.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', () => openModal(Number(card.dataset.id)));
  });
}

function openModal(id) {
  currentId = id;

  if (!w) return;
  const links = w.links || {};

  if (links.bilibili)    linkRows.push(`<a class="modal-link link-bili"     href="${links.bilibili}"    target="_blank"><span class="icon">${ICONS.bilibili}</span>BiliBili 教學影片</a>`);
  if (links.xiaohongshu) linkRows.push(`<a class="modal-link link-xhs"      href="${links.xiaohongshu}" target="_blank"><span class="icon">${ICONS.xiaohongshu}</span>小紅書圖文</a>`);
  if (links.qianliao)    linkRows.push(`<a class="modal-link link-qianliao" href="${links.qianliao}"    target="_blank"><span class="icon">${ICONS.qianliao}</span>千聊課程</a>`);
  if (links.youtube)     linkRows.push(`<a class="modal-link link-yt"       href="${links.youtube}"     target="_blank"><span class="icon">${ICONS.youtube}</span>YouTube 影片</a>`);
  if (links.douyin)      linkRows.push(`<a class="modal-link link-dy"       href="${links.douyin}"      target="_blank"><span class="icon">${ICONS.douyin}</span>抖音影片</a>`);
  if (links.other)       linkRows.push(`<a class="modal-link link-other"    href="${links.other}"       target="_blank"><span class="icon">${ICONS.other}</span>其他連結</a>`);

  const photosHTML   = w.photos && w.photos.length
    ? `<div class="modal-section"><h3>📂 編織資料</h3><div class="modal-photos">${w.photos.map(p=>`<img src="${p}" alt="">`).join("")}</div></div>` : "";

    ? `<div class="modal-section"><h3>🎨 作品展示</h3><div class="modal-img" style="border-radius:12px;margin-bottom:0;aspect-ratio:4/3"><img src="${w.displayImage}" alt="展示圖" style="border-radius:12px"></div></div>` : "";

    w.bought ? `<span class="tag" style="background:#e8f0ff;color:#2563eb">🛒 材料已購</span>` : `<span class="tag" style="background:#fdf0f5;color:#c96b8a">🛍️ 材料待購</span>`
  ].join("");

  document.getElementById("modal").innerHTML = `
    ${w.image ? `<div class="modal-img"><img src="${w.image}" alt="${w.name}"></div>` : `<div class="modal-img">🧶</div>`}
    <div class="modal-body">
      <div class="modal-title">${w.name}</div>
      <div class="modal-date">${w.needle||''} ${w.yarn?'・'+w.yarn:''}</div>
      <div class="modal-tags" style="margin-bottom:10px">${statusBadges}</div>
      <div class="modal-tags">${(w.tags||[]).map(t=>`<span class="tag">${t}</span>`).join("")}</div>
      ${w.note?`<div class="modal-section"><h3>📝 製作筆記</h3><div class="modal-note">${w.note}</div></div>`:''}
      ${displayHTML}${photosHTML}
      ${linkRows.length?`<div class="modal-section"><h3>🔗 教學連結</h3><div class="modal-links">${linkRows.join("")}</div></div>`:''}
      <div class="modal-actions">
        <button class="btn-edit" id="btnModalEdit" type="button">✏️ 編輯</button>
        <button class="btn-delete" id="btnModalDelete" type="button">🗑️ 刪除</button>
      </div>
    </div>`;
  document.getElementById('btnModalEdit').addEventListener('click', () => editWork(id));
  document.getElementById('btnModalDelete').addEventListener('click', () => deleteWork(id));
  document.getElementById("overlay").classList.add("open");
  document.body.style.overflow = "hidden";
}
function closeModal() {
  document.getElementById("overlay").classList.remove("open");
  document.body.style.overflow = "";
  currentId = null;
}
async function deleteWork(id) {
  if (!confirm("確定要刪除這件作品嗎？")) return;
  await dbDelete(id);
  works = works.filter(w => w.id !== id);
  closeModal(); render();
}

let editingId = null, currentTags = [];
let coverBase64 = "", displayBase64 = "";
let photoBase64s = ["","","","","",""];
let isDone = false, isBought = false;

function toggleDone() {
  isDone = !isDone;
  const el = document.getElementById("doneToggle");
  el.classList.toggle("checked", isDone);
  el.querySelector(".toggle-label").textContent = isDone ? "已完成 ✓" : "尚未完成";
}
function toggleBought() {
  isBought = !isBought;
  const el = document.getElementById("boughtToggle");
  el.classList.toggle("checked", isBought);
  el.querySelector(".toggle-label").textContent = isBought ? "已購買 ✓" : "尚未購買";
}
function setToggle(elId, val, trueText, falseText) {
  const el = document.getElementById(elId);
  el.classList.toggle("checked", val);
  el.querySelector(".toggle-label").textContent = val ? trueText : falseText;
}

function openForm(id=null) {
  editingId = id; currentTags = [];
  coverBase64 = ""; displayBase64 = "";
  isDone = false; isBought = false;
  photoBase64s = id ? [...(works.find(x=>x.id===id)?.photos||[])] : [];
  document.getElementById("formTitle").textContent = id ? "✏️ 編輯作品" : "✨ 新增作品";
  const fields = ["fName","fNeedle","fYarn","fNote","fBili","fXhs","fQl","fYt","fDy","fOther"];
  if (id) {
    const w = works.find(x => x.id === id);
    document.getElementById("fName").value   = w.name   || "";
    document.getElementById("fNeedle").value = w.needle || "";
    document.getElementById("fYarn").value   = w.yarn   || "";
    document.getElementById("fNote").value   = w.note   || "";
    document.getElementById("fBili").value   = (w.links||{}).bilibili    || "";
    document.getElementById("fXhs").value    = (w.links||{}).xiaohongshu || "";
    document.getElementById("fQl").value     = (w.links||{}).qianliao   || "";
    document.getElementById("fYt").value     = (w.links||{}).youtube     || "";
    document.getElementById("fDy").value     = (w.links||{}).douyin      || "";
    document.getElementById("fOther").value  = (w.links||{}).other       || "";
    currentTags   = [...(w.tags   || [])];
    coverBase64   = w.image        || "";
    displayBase64 = w.displayImage || "";
    isDone   = !!w.done;
    isBought = !!w.bought;
    photoBase64s = [...(w.photos || [])];
    while (photoBase64s.length < 6) photoBase64s.push("");
  } else {
    fields.forEach(f => document.getElementById(f).value = "");
  }
  setToggle("doneToggle",   isDone,   "已完成 ✓", "尚未完成");
  setToggle("boughtToggle", isBought, "已購買 ✓", "尚未購買");
  renderTags(); renderCoverPreview(); renderDisplayPreview(); renderPhotosGrid();
  closeModal();
  document.getElementById("formOverlay").classList.add("open");
  document.body.style.overflow = "hidden";
}
function closeForm() {
  document.getElementById("formOverlay").classList.remove("open");
  document.body.style.overflow = "";
}
function editWork(id) { openForm(id); }

/* 圖片壓縮 */
function compressImage(dataUrl, maxSize=900, quality=0.8) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      let w = img.width, h = img.height;
      if (w > maxSize || h > maxSize) {
        if (w > h) { h = Math.round(h * maxSize / w); w = maxSize; }
        else       { w = Math.round(w * maxSize / h); h = maxSize; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.src = dataUrl;
  });
}

/* 封面圖片 */
function handleCoverUpload(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = async ev => { coverBase64 = await compressImage(ev.target.result); renderCoverPreview(); };
  reader.readAsDataURL(file);
}
function renderCoverPreview() {
  const img = document.getElementById("coverPreview");
  const btn = document.getElementById("coverClear");
  const area = document.getElementById("coverUploadArea");
  const hint = area.querySelector(".upload-hint");
  const icon = area.querySelector(".upload-icon");
  if (coverBase64) {
    img.src = coverBase64; img.style.display = "block"; btn.style.display = "flex";
    if(hint) hint.style.display = "none"; if(icon) icon.style.display = "none";
  } else {
    img.style.display = "none"; btn.style.display = "none";
    if(hint) hint.style.display = "block"; if(icon) icon.style.display = "block";
  }
}
function clearCover(e) { e.stopPropagation(); coverBase64 = ""; document.getElementById("coverInput").value = ""; renderCoverPreview(); }

/* 展示圖 */
function handleDisplayUpload(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = async ev => { displayBase64 = await compressImage(ev.target.result); renderDisplayPreview(); };
  reader.readAsDataURL(file);
}
function renderDisplayPreview() {
  const img  = document.getElementById("displayPreview");
  const btn  = document.getElementById("displayClear");
  const hint = document.getElementById("displayHint");
  const icon = document.getElementById("displayIcon");
  if (displayBase64) {
    img.src = displayBase64; img.style.display = "block"; btn.style.display = "flex";
    if(hint) hint.style.display = "none"; if(icon) icon.style.display = "none";
  } else {
    img.style.display = "none"; btn.style.display = "none";
    if(hint) hint.style.display = "block"; if(icon) icon.style.display = "block";
  }
}
function clearDisplay(e) { e.stopPropagation(); displayBase64 = ""; document.getElementById("displayInput").value = ""; renderDisplayPreview(); }

/* 編織資料（多選，不限張數）*/
function renderPhotosGrid() {
  document.getElementById("photosGrid").innerHTML = photoBase64s.map((p, i) => `
    <div class="photo-slot">
      <img src="${p}" alt="">
      <button class="remove-photo" type="button" onclick="removePhoto(event,${i})">✕</button>
    </div>`).join("");
}

function handleMultiPhotoUpload(e) {
  const files = Array.from(e.target.files);
  if (!files.length) return;
  let processed = 0;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = async ev => {
      photoBase64s.push(await compressImage(ev.target.result));
      processed++;
      if (processed === files.length) renderPhotosGrid();
    };
    reader.readAsDataURL(file);
  });
  e.target.value = ''; // 允許重複選
}
function removePhoto(e, idx) { e.stopPropagation(); photoBase64s.splice(idx, 1); renderPhotosGrid(); }

/* 標籤 */
function renderTags() {
  const wrap = document.getElementById("tagsWrap");
  const input = document.getElementById("tagInput");
  wrap.innerHTML = "";
  currentTags.forEach(t => {
    const span = document.createElement("span");
    span.className = "tag-item";
    span.innerHTML = `${t}<button type="button" onclick="removeTag('${t}')">×</button>`;
    wrap.appendChild(span);
  });
  wrap.appendChild(input); input.value = "";
}
function handleTagInput(e) {
  if (e.key === "Enter" || e.key === ",") {
    e.preventDefault();
    const val = e.target.value.trim();
    if (val && !currentTags.includes(val)) { currentTags.push(val); renderTags(); }
    else e.target.value = "";
  }
}
function removeTag(t) { currentTags = currentTags.filter(x => x !== t); renderTags(); }

/* 儲存 — 直接寫入 IndexedDB，無空間限制 */
async function saveWork() {
  const name = document.getElementById("fName").value.trim();
  if (!name) { alert("請填入作品名稱！"); return; }
  const work = {
    id:           editingId || Date.now(),
    name,
    image:        coverBase64,
    displayImage: displayBase64,
    done:         isDone,
    bought:       isBought,
    tags:         currentTags,
    note:         document.getElementById("fNote").value.trim(),
    needle:       document.getElementById("fNeedle").value.trim(),
    yarn:         document.getElementById("fYarn").value.trim(),
    links: {
      bilibili:    document.getElementById("fBili").value.trim(),
      xiaohongshu: document.getElementById("fXhs").value.trim(),
      qianliao:    document.getElementById("fQl").value.trim(),
      youtube:     document.getElementById("fYt").value.trim(),
      douyin:      document.getElementById("fDy").value.trim(),
      other:       document.getElementById("fOther").value.trim()
    },
    photos: photoBase64s.filter(p => p)
  };
  try {
    await dbPut(work);
    works = await dbGetAll();
    closeForm(); render();
  } catch(err) {
    alert('❌ 儲存失敗：' + err.message);
  }
}

/* ═══════════════════════════════════════════
   初始化
═══════════════════════════════════════════ */
async function init() {
  // 開啟 IndexedDB
  await openDB();

  // 從 IndexedDB 載入資料
  works = await dbGetAll();

  // 若是全新安裝，遷移舊的 localStorage 資料
  if (works.length === 0) {
    const old = localStorage.getItem('knitting_works');
    if (old) {
      try {
        const parsed = JSON.parse(old);
        for (const w of parsed) await dbPut(w);
        works = await dbGetAll();
        localStorage.removeItem('knitting_works');
      } catch(e) {}
    }
  }

  // 若完全空白，加入示範作品
  if (works.length === 0) {
    const demo = {
      id: Date.now(), name: "貓咪掛件", image: "", displayImage: "",
      done: false, bought: false,
      tags: ["鉤針","掛件","動物系","初級"],
      note: "黑白配色的貓咪臉造型，搭配小花朵髮圈裝飾。毛線用量少，很適合新手練習立體造型。",
      needle: "2.5mm 鉤針", yarn: "黑色 / 白色棉線各少量",
      links: { bilibili: "https://www.bilibili.com/video/BV19v4y197iT/", xiaohongshu:"", qianliao:"", youtube:"", douyin:"", other:"" },
      photos: []
    };
    await dbPut(demo); works = [demo];
  }

  // 綁定所有事件
  document.getElementById('btnAddWork').addEventListener('click', () => openForm());
  document.getElementById('btnSave').addEventListener('click', saveWork);
  document.getElementById('btnCancel').addEventListener('click', closeForm);
  document.getElementById('btnCloseModal').addEventListener('click', closeModal);
  document.getElementById('overlay').addEventListener('click', e => { if (e.target === document.getElementById('overlay')) closeModal(); });
  document.getElementById('formOverlay').addEventListener('click', e => { if (e.target === document.getElementById('formOverlay')) closeForm(); });
  document.getElementById('doneToggle').addEventListener('click', toggleDone);
  document.getElementById('boughtToggle').addEventListener('click', toggleBought);
  document.getElementById('tagInput').addEventListener('keydown', handleTagInput);
  document.getElementById('tagsWrap').addEventListener('click', () => document.getElementById('tagInput').focus());
  document.getElementById('coverInput').addEventListener('change', handleCoverUpload);
  document.getElementById('displayInput').addEventListener('change', handleDisplayUpload);
  document.getElementById('coverClear').addEventListener('click', clearCover);
  document.getElementById('displayClear').addEventListener('click', clearDisplay);
  document.getElementById('btnPickPhotos').addEventListener('click', () => document.getElementById('photosInput').click());
  document.getElementById('photosInput').addEventListener('change', handleMultiPhotoUpload);
  document.getElementById('btnExport').addEventListener('click', exportData);
  document.getElementById('btnImport').addEventListener('click', () => document.getElementById('importInput').click());
  document.getElementById('importInput').addEventListener('change', importData);
  document.getElementById('searchInput').addEventListener('input', render);

  buildFilterBar();
  render();
}

init();
</script>
